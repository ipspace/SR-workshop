---
directory: 1-intro/6-multivendor
steps:
  "Start the lab": { cmd: netlab up --no-config, wait: True }
  "Configure the lab": netlab initial
  "Display available netlab reports": netlab show reports
  "Report devices and images": netlab report devices
  "Connect to PE1": { cmd: netlab connect pe1, wait: "pe1#" }
  "Global blocks": show isis segment-routing global-blocks
  "MPLS LFIB": { cmd: show mpls route, more: True }
  "Done with PE1": exit
  "Stop the lab": { cmd: netlab down --cleanup, wait: True }
