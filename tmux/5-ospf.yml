---
directory: 1-intro/5-ospf
steps:
  "Start the lab": netlab up
  "OSPF areas": netlab report ospf-areas
  "Connect to PE1": netlab connect pe1
  "SR-MPLS prefix segments": show ip ospf segment-routing prefix-segments
  "SR-MPLS bindings": show ip ospf segment-routing bindings
  "Done with PE1": exit
  "Stop the lab": netlab down --cleanup
