provider: clab
defaults.device: eos

bgp.as: 65000

groups:
  _auto_create: True
  core:
    members: [ p1 ]
    module: [ isis, sr ]
  edge:
    members: [ pe1, pe2 ]
    module: [ isis, bgp, sr ]
  hosts:
    members: [ ha, hb ]
    device: linux

links:
- group: core
  members: [ pe1-p1, p1-pe2 ]
- group: edge
  isis: False
  bgp.advertise: True
  members: [ ha-pe1, hb-pe2 ]
