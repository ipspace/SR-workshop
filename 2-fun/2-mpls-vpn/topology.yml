provider: clab
defaults.device: eos

bgp.as: 65000
mpls.vpn: True
mpls.ldp: False

groups:
  _auto_create: True
  core:
    members: [ p1 ]
    module: [ isis, sr ]
  edge:
    members: [ pe1, pe2 ]
    module: [ isis, bgp, sr, mpls, vrf ]
  hosts:
    members: [ ha, hb ]
    device: linux

vrfs:
  tenant:
    links: [ ha-pe1, hb-pe2 ]

links:
- group: core
  members: [ pe1-p1, p1-pe2 ]
